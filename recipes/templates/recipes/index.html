{% extends 'recipes/base.html' %}

{% block page_header %}
<h1 style="color:blue; text-align: center;">Recipe</h1>
{% endblock page_header %}

{% block content %}

{% for recipe in recipes %}
<section>
<h4 class=text-success>{{recipe.title}}</h4>   
<p> Author:{{recipe.author}}</p>
<p>{{recipe.content}}</p>
<p>{{recipe.ingredients}}</p>
<p>{{recipe.date_created}}</p>
</section>

{% endfor %}
{% endblock content %}
